[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NEXT_USE_NETLIFY_EDGE = "true"
  NEXT_DISABLE_SOURCEMAPS = "true"
  GENERATE_SOURCEMAP = "false"
  CI = "false"
  NODE_OPTIONS = "--max-old-space-size=4096"
